<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liyamu Sandaru - Zoom & Drag</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pothana&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Sinhala', sans-serif;
            background-color: #111827;
            color: #f3f4f6;
            user-select: none;
        }
        
        /* 1080px export layout */
        .post-layout {
            display: flex;
            flex-direction: column;
            background: white;
            width: 1080px;
            height: 1080px;
            overflow: hidden;
            position: relative;
        }

        /* Photo Area - 40% (432px) */
        .img-box {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 1fr;
            height: 432px; 
            background: #eee;
            border-bottom: 8px solid #ef4444; 
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .post-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-right: 2px solid #fff; 
            object-position: 50% 50%;
            cursor: move;
            touch-action: none;
            transition: transform 0.1s ease-out;
        }

        .post-image:last-child { border-right: none; }

        /* Text Area - 60% (648px) */
        .txt-box {
            height: 648px; 
            padding: 40px 80px;
            display: flex;
            flex-direction: column;
            background-color: white;
            position: relative;
            z-index: 2;
        }

        .main-text-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 100px; 
        }

        .main-text {
            font-family: 'Pothana', serif;
            color: #111;
            font-weight: normal;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            text-align: center;
            width: 100%;
        }

        /* Fixed Credit - Absolute Bottom */
        .credit-text {
            position: absolute;
            bottom: 50px; 
            left: 0;
            right: 0;
            font-family: 'Pothana', serif;
            font-size: 32px;
            color: #555;
            text-align: center;
            pointer-events: none;
        }

        /* Logo Styling */
        .logo-overlay {
            position: absolute;
            z-index: 100;
            cursor: move;
            touch-action: none;
            width: 120px;
        }
        .logo-overlay img {
            width: 100%;
            height: auto;
            pointer-events: none;
            display: block;
        }

        /* UI Preview scaling (0.45x) */
        .preview-container {
            width: 486px; 
            height: 486px;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.15);
            margin: 0 auto;
            position: relative;
        }

        .ui-img-box { height: 194.4px; border-bottom-width: 3.6px !important; } 
        .ui-txt-box { height: 291.6px; padding: 20px 35px; }
        .ui-credit { bottom: 22.5px; font-size: 14.4px; }
        .ui-post-image { border-right-width: 0.9px !important; }
        .ui-logo { width: 54px; }

        #hidden-capture {
            position: absolute;
            left: -9999px;
            top: 0;
        }

        input[type="range"] { accent-color: #dc2626; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-1">Liyamu Sandaru</h1>
            <p class="text-gray-400 text-sm">Zoom & Drag Photos | 1080x1080 Professional</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-12 justify-center items-start">
            
            <!-- Settings Panel -->
            <div class="w-full lg:w-96 bg-gray-800 p-6 rounded-3xl shadow-2xl border border-gray-700">
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-300 mb-2">Select Photos</label>
                        <div class="relative group">
                            <input type="file" id="imageInput" multiple accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="Choose photos">
                            <div class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-gray-700 border-2 border-dashed border-gray-500 rounded-xl group-hover:border-red-500 group-hover:bg-red-900/20 transition-all duration-200">
                                <svg class="w-5 h-5 text-gray-400 group-hover:text-red-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                <span id="file-name-display" class="text-sm font-medium text-gray-300 group-hover:text-red-400 truncate transition-colors">Click to Select Photos</span>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 bg-gray-900 rounded-2xl border border-gray-700 space-y-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-red-500 mb-2">Adjust Photo</label>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 italic">Zoom Photo</label>
                            <input type="range" id="zoomSlider" min="1" max="3" step="0.05" value="1" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                        </div>
                        
                        <div class="pt-2 border-t border-gray-700">
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-[10px] font-bold text-gray-400 italic">Logo Size</label>
                                <!-- Logo On/Off Toggle Button -->
                                <label class="relative inline-flex items-center cursor-pointer" title="Toggle Logo On/Off">
                                    <input type="checkbox" id="logoToggle" class="sr-only peer" checked>
                                    <div class="w-7 h-4 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:bg-red-500"></div>
                                </label>
                            </div>
                            <input type="range" id="logoSizeSlider" min="30" max="400" value="120" class="w-full h-1 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Font Size (Main Text)</label>
                        <input type="range" id="fontSizeSlider" min="20" max="150" value="44" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Quote Text</label>
                        <textarea id="mainTextInput" rows="5" class="w-full p-4 bg-gray-700 border border-gray-600 text-white rounded-2xl outline-none text-sm focus:ring-2 focus:ring-red-500" placeholder="Type here..."></textarea>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-400 mb-2">Credit</label>
                        <select id="creditSelect" class="w-full p-3 bg-gray-700 border border-gray-600 text-white rounded-2xl outline-none text-sm cursor-pointer hover:border-red-500 focus:ring-2 focus:ring-red-500 transition">
                            <option value="-Digamadulla-">-Digamadulla-</option>
                            <option value="-The Status-">-The Status-</option>
                        </select>
                    </div>

                    <button id="downloadBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-4 rounded-2xl transition shadow-lg flex items-center justify-center gap-2">
                        <span>Download Post (1080px)</span>
                    </button>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="flex-1 flex flex-col items-center">
                <div id="ui-preview" class="preview-container ring-4 ring-gray-800 rounded-md">
                    
                    <div id="ui-logo" class="logo-overlay ui-logo">
                        <img id="ui-logo-img" crossorigin="anonymous" src="https://lh3.googleusercontent.com/d/1uYuefcCvKkGmwwn2vbi3v0BcMk69hbOH" alt="Logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/150?text=Logo+Error';">
                    </div>

                    <div id="ui-imageDisplay" class="img-box ui-img-box">
                        <div class="flex items-center justify-center text-gray-300 text-center p-10 h-full w-full italic text-xs">Selected photos will appear here...</div>
                    </div>
                    <div class="txt-box ui-txt-box">
                        <div class="main-text-area">
                            <div id="ui-mainText" class="main-text">Your quote will appear here.</div>
                        </div>
                        <div id="ui-credit" class="credit-text ui-credit">-Digamadulla-</div>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500">1080x1080 AUTOMATED LAYOUT</p>
                    <div class="flex flex-col gap-1 mt-3 justify-center">
                        <p class="text-[11px] text-red-400 font-bold italic">💡 Zoom and drag the photo to adjust.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Final 1080px Hidden Area -->
    <div id="hidden-capture">
        <div id="final-post" class="post-layout">
            <div id="final-logo" class="logo-overlay">
                <img id="final-logo-img" crossorigin="anonymous" src="https://lh3.googleusercontent.com/d/1uYuefcCvKkGmwwn2vbi3v0BcMk69hbOH" alt="Logo">
            </div>
            <div id="final-imageDisplay" class="img-box"></div>
            <div class="txt-box">
                <div class="main-text-area">
                    <div id="final-mainText" class="main-text">Type here...</div>
                </div>
                <div id="final-credit" class="credit-text">-Digamadulla-</div>
            </div>
        </div>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const mainTextInput = document.getElementById('mainTextInput');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const logoSizeSlider = document.getElementById('logoSizeSlider');
        const zoomSlider = document.getElementById('zoomSlider');
        const downloadBtn = document.getElementById('downloadBtn');
        const creditSelect = document.getElementById('creditSelect');
        const logoToggle = document.getElementById('logoToggle'); // අලුතින් එකතු කළා

        const uiImgBox = document.getElementById('ui-imageDisplay');
        const finalImgBox = document.getElementById('final-imageDisplay');
        const uiTxt = document.getElementById('ui-mainText');
        const finalTxt = document.getElementById('final-mainText');
        const uiCredit = document.getElementById('ui-credit');
        const finalCredit = document.getElementById('final-credit');

        const uiLogo = document.getElementById('ui-logo');
        const finalLogo = document.getElementById('final-logo');

        let imagePositions = [];
        let logoPos = { x: 920, y: 40 };
        let currentZoom = 1;

        window.onload = () => {
            const savedLogoPos = localStorage.getItem('embedded_logo_pos');
            const savedLogoSize = localStorage.getItem('embedded_logo_size');
            const savedLogoVisible = localStorage.getItem('embedded_logo_visible'); // අලුතින් එකතු කළා

            if (savedLogoPos) logoPos = JSON.parse(savedLogoPos);
            if (savedLogoSize) {
                logoSizeSlider.value = savedLogoSize;
                updateLogoSize(savedLogoSize);
            }
            
            // ලෝගෝ එක On ද Off ද කියල චෙක් කරලා ඒ විදියට පෙන්නනවා
            if (savedLogoVisible !== null) {
                const isVisible = savedLogoVisible === 'true';
                logoToggle.checked = isVisible;
                uiLogo.style.display = isVisible ? 'block' : 'none';
                finalLogo.style.display = isVisible ? 'block' : 'none';
            }

            updateLogoUI();
        };

        function updateLogoUI() {
            uiLogo.style.left = (logoPos.x * 0.45) + 'px';
            uiLogo.style.top = (logoPos.y * 0.45) + 'px';
            finalLogo.style.left = logoPos.x + 'px';
            finalLogo.style.top = logoPos.y + 'px';
        }

        function updateLogoSize(size) {
            uiLogo.style.width = (size * 0.45) + 'px';
            finalLogo.style.width = size + 'px';
        }

        imageInput.addEventListener('change', function(e) {
            const fileNameDisplay = document.getElementById('file-name-display');
            if (this.files && this.files.length > 1) {
                fileNameDisplay.textContent = this.files.length + ' photos selected';
            } else if (this.files && this.files.length === 1) {
                fileNameDisplay.textContent = this.files[0].name;
            } else {
                fileNameDisplay.textContent = 'Click to Select Photos';
            }

            const files = Array.from(e.target.files);
            if (files.length === 0) return;
            uiImgBox.innerHTML = '';
            finalImgBox.innerHTML = '';
            imagePositions = [];
            
            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const src = event.target.result;
                    imagePositions[index] = { x: 50, y: 50 };
                    
                    const imgUI = document.createElement('img');
                    imgUI.src = src; 
                    imgUI.className = 'post-image ui-post-image';
                    imgUI.draggable = false;
                    imgUI.id = `ui-img-${index}`;
                    imgUI.style.transform = `scale(${currentZoom})`;
                    setupDrag(imgUI, index, 'bg');
                    uiImgBox.appendChild(imgUI);

                    const imgFinal = document.createElement('img');
                    imgFinal.src = src; 
                    imgFinal.className = 'post-image';
                    imgFinal.id = `final-img-${index}`;
                    imgFinal.style.transform = `scale(${currentZoom})`;
                    finalImgBox.appendChild(imgFinal);
                }
                reader.readAsDataURL(file);
            });
        });

        zoomSlider.addEventListener('input', (e) => {
            currentZoom = e.target.value;
            const uiImgs = uiImgBox.querySelectorAll('img');
            const finalImgs = finalImgBox.querySelectorAll('img');
            
            uiImgs.forEach(img => img.style.transform = `scale(${currentZoom})`);
            finalImgs.forEach(img => img.style.transform = `scale(${currentZoom})`);
        });

        function setupDrag(el, index, type) {
            let isDragging = false;
            let startY, startX, currentY, currentX;

            const onStart = (e) => {
                isDragging = true;
                const point = e.type.includes('touch') ? e.touches[0] : e;
                startY = point.clientY;
                startX = point.clientX;
                
                if (type === 'bg') {
                    currentY = imagePositions[index].y;
                    currentX = imagePositions[index].x;
                } else {
                    currentY = logoPos.y;
                    currentX = logoPos.x;
                }
            };

            const onMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const point = e.type.includes('touch') ? e.touches[0] : e;
                const diffY = (point.clientY - startY);
                const diffX = (point.clientX - startX);

                if (type === 'bg') {
                    const sensitivity = 5 / currentZoom;
                    let newY = Math.max(0, Math.min(100, currentY - (diffY / sensitivity)));
                    let newX = Math.max(0, Math.min(100, currentX - (diffX / sensitivity)));
                    
                    imagePositions[index].y = newY;
                    imagePositions[index].x = newX;
                    
                    const posStr = `${newX}% ${newY}%`;
                    el.style.objectPosition = posStr;
                    
                    const fImg = document.getElementById(`final-img-${index}`);
                    if(fImg) fImg.style.objectPosition = posStr;
                } else {
                    let newY = currentY + (diffY / 0.45);
                    let newX = currentX + (diffX / 0.45);
                    newX = Math.max(0, Math.min(1080 - finalLogo.offsetWidth, newX));
                    newY = Math.max(0, Math.min(1080 - finalLogo.offsetHeight, newY));
                    logoPos.x = newX;
                    logoPos.y = newY;
                    updateLogoUI();
                    localStorage.setItem('embedded_logo_pos', JSON.stringify(logoPos));
                }
            };

            const onEnd = () => isDragging = false;

            el.addEventListener('mousedown', onStart);
            el.addEventListener('touchstart', onStart, { passive: false });
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        setupDrag(uiLogo, 0, 'logo');

        mainTextInput.addEventListener('input', () => {
            const val = mainTextInput.value || "Your quote will appear here.";
            uiTxt.textContent = val;
            finalTxt.textContent = val;
        });

        fontSizeSlider.addEventListener('input', (e) => {
            const size = parseInt(e.target.value);
            uiTxt.style.fontSize = (size * 0.45) + 'px';
            finalTxt.style.fontSize = size + 'px';
        });

        logoSizeSlider.addEventListener('input', (e) => {
            const size = parseInt(e.target.value);
            updateLogoSize(size);
            localStorage.setItem('embedded_logo_size', size);
        });

        // Logo එක On/Off කරනකොට වැඩ කරන කොටස
        logoToggle.addEventListener('change', (e) => {
            const isVisible = e.target.checked;
            uiLogo.style.display = isVisible ? 'block' : 'none';
            finalLogo.style.display = isVisible ? 'block' : 'none';
            localStorage.setItem('embedded_logo_visible', isVisible);
        });

        creditSelect.addEventListener('change', (e) => {
            const selectedCredit = e.target.value;
            uiCredit.textContent = selectedCredit;
            finalCredit.textContent = selectedCredit;
        });

        downloadBtn.addEventListener('click', () => {
            const target = document.getElementById('final-post');
            downloadBtn.innerHTML = 'Generating Post...';
            downloadBtn.disabled = true;

            html2canvas(target, {
                scale: 1,
                useCORS: true,
                width: 1080,
                height: 1080,
                logging: false,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                const currentCreditName = creditSelect.value.replace(/-/g, '').trim();
                link.download = `${currentCreditName}_Post.png`;
                link.href = canvas.toDataURL('image/png', 1.0);
                link.click();
                downloadBtn.innerHTML = 'Download Post (1080px)';
                downloadBtn.disabled = false;
            }).catch(err => {
                console.error(err);
                downloadBtn.innerHTML = 'Error! Try again.';
                downloadBtn.disabled = false;
            });
        });

        const initialSize = fontSizeSlider.value;
        uiTxt.style.fontSize = (initialSize * 0.45) + 'px';
        finalTxt.style.fontSize = initialSize + 'px';
        updateLogoUI();
    </script>

</body>
</html>
